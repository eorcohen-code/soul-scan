<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>שאלון זיהוי הדפוס החוזר בדייטים</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;500;700;900&family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#F6EEF0; --bg2:#F1E7E3;
    --ink:#3A2630; --ink-soft:#6E5560;
    --card:#FFFFFF;
    --rose:#B26B82; --rose-deep:#8E4E64;
    --gold:#C19A53; --gold-soft:#E7D6AE;
    --line:#EADDE0;
    --shadow:0 24px 60px -28px rgba(90,40,60,.40);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100%}
  body{
    font-family:'Assistant',system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1100px 600px at 80% -8%, #FBF4F2 0%, transparent 60%),
      radial-gradient(900px 500px at 10% 110%, #F3E9E4 0%, transparent 55%),
      linear-gradient(160deg,var(--bg1),var(--bg2));
    background-attachment:fixed;
    display:flex; align-items:center; justify-content:center;
    padding:28px 18px; line-height:1.7;
  }
  .wrap{width:100%; max-width:640px}
  .card{
    background:var(--card); border-radius:26px; box-shadow:var(--shadow);
    border:1px solid rgba(255,255,255,.7);
    overflow:hidden;
  }
  .pad{padding:38px 34px}
  @media(max-width:520px){.pad{padding:30px 22px}}

  h1,h2,h3,.serif{font-family:'Frank Ruhl Libre',Georgia,serif}

  /* ---------- scan signature ---------- */
  .scan{position:relative; width:96px; height:96px; margin:0 auto 22px}
  .scan .ring{
    position:absolute; inset:0; border-radius:50%;
    border:1.5px solid var(--rose);
    opacity:0; transform:scale(.55);
    animation:pulse 3.4s ease-out infinite;
  }
  .scan .ring:nth-child(2){animation-delay:1.13s; border-color:var(--gold)}
  .scan .ring:nth-child(3){animation-delay:2.26s}
  .scan .core{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  }
  .scan .core svg{width:44px; height:44px}
  @keyframes pulse{
    0%{opacity:.55; transform:scale(.5)}
    70%{opacity:0; transform:scale(1.15)}
    100%{opacity:0; transform:scale(1.2)}
  }

  .eyebrow{
    font-size:13px; letter-spacing:.22em; font-weight:700;
    color:var(--rose-deep); text-align:center; margin-bottom:12px;
  }
  .intro h1{font-size:clamp(26px,6vw,38px); font-weight:900; text-align:center; line-height:1.25}
  .intro .lead{text-align:center; color:var(--ink-soft); font-size:18px; margin-top:16px}
  .intro .meta{
    text-align:center; color:var(--ink-soft); font-size:14px; margin-top:22px;
    display:flex; gap:18px; justify-content:center; flex-wrap:wrap;
  }
  .intro .meta b{color:var(--ink)}

  .btn{
    display:block; width:100%; border:0; cursor:pointer;
    font-family:'Assistant',sans-serif; font-weight:700; font-size:18px;
    color:#fff; padding:17px 22px; border-radius:16px; margin-top:26px;
    background:linear-gradient(135deg,var(--rose),var(--rose-deep));
    box-shadow:0 14px 30px -12px rgba(142,78,100,.7);
    transition:transform .15s ease, box-shadow .2s ease;
  }
  .btn:hover{transform:translateY(-2px); box-shadow:0 18px 34px -12px rgba(142,78,100,.8)}
  .btn:active{transform:translateY(0)}
  .btn.gold{background:linear-gradient(135deg,#CBA45C,#A87E36); box-shadow:0 14px 30px -12px rgba(168,126,54,.7)}

  /* ---------- progress ---------- */
  .top{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px}
  .count{font-size:14px; color:var(--ink-soft); font-weight:600}
  .bar{height:7px; background:var(--line); border-radius:99px; overflow:hidden; margin-bottom:30px}
  .fill{height:100%; width:0; border-radius:99px;
    background:linear-gradient(90deg,var(--gold),var(--rose));
    transition:width .45s cubic-bezier(.3,.8,.3,1)}

  .q{font-family:'Frank Ruhl Libre',Georgia,serif; font-size:clamp(21px,4.8vw,28px); font-weight:700; line-height:1.42; margin-bottom:24px}
  .opt{
    display:flex; gap:14px; align-items:flex-start; text-align:right;
    width:100%; background:#FBF6F7; border:1.6px solid transparent;
    border-radius:16px; padding:16px 18px; margin-bottom:13px; cursor:pointer;
    font-family:inherit; font-size:16.5px; color:var(--ink); line-height:1.55;
    transition:border-color .18s ease, background .18s ease, transform .12s ease;
  }
  .opt:hover{background:#F7EEF1; border-color:var(--rose); transform:translateX(-3px)}
  .opt .dot{
    flex:0 0 auto; width:22px; height:22px; border-radius:50%; margin-top:3px;
    border:2px solid var(--rose); position:relative;
  }
  .opt:hover .dot::after{
    content:""; position:absolute; inset:4px; border-radius:50%; background:var(--rose);
  }
  .back{background:none; border:0; color:var(--ink-soft); font:inherit; cursor:pointer;
    margin-top:6px; font-size:14px}
  .back:hover{color:var(--rose-deep)}

  /* ---------- result ---------- */
  .res .tag{font-size:13px; letter-spacing:.18em; font-weight:700; color:var(--gold); text-align:center}
  .res h2{font-size:clamp(26px,6vw,36px); font-weight:900; text-align:center; margin:8px 0 4px}
  .res .sub{text-align:center; color:var(--ink-soft); font-size:17px; margin-bottom:26px}
  .block{border-top:1px solid var(--line); padding:20px 0}
  .block:first-of-type{border-top:0}
  .block .label{
    font-size:12.5px; letter-spacing:.16em; font-weight:700;
    color:var(--rose-deep); margin-bottom:7px; display:flex; align-items:center; gap:8px;
  }
  .block .label::before{content:""; width:18px; height:2px; background:var(--gold); border-radius:2px}
  .block p{font-size:16.5px; color:var(--ink)}
  .block .belief{font-family:'Frank Ruhl Libre',serif; font-size:19px; font-style:italic; color:var(--rose-deep)}

  /* ---------- CTA ---------- */
  .cta{
    margin-top:30px; border-radius:22px; padding:30px 26px; color:#fff; text-align:center;
    background:
      radial-gradient(600px 300px at 80% -20%, rgba(255,255,255,.12), transparent 60%),
      linear-gradient(155deg,#5B3242,#7E4258 55%,#9A5168);
    position:relative; overflow:hidden;
  }
  .cta .spark{font-size:13px; letter-spacing:.2em; font-weight:700; color:var(--gold-soft)}
  .cta h3{font-size:clamp(22px,5vw,28px); font-weight:900; margin:10px 0 14px; line-height:1.3}
  .cta .bridge{font-size:16.5px; color:#F3E3E8; max-width:440px; margin:0 auto 18px}
  .learn{text-align:right; max-width:430px; margin:0 auto 8px}
  .learn li{display:flex; gap:11px; align-items:flex-start; margin:11px 0; font-size:16px; color:#FBEEF1}
  .learn li .v{flex:0 0 auto; color:var(--gold-soft); font-weight:800; margin-top:2px}
  .price{margin:22px 0 4px}
  .price .old{color:#E7C7D1; text-decoration:line-through; font-size:18px; opacity:.8}
  .price .now{font-family:'Frank Ruhl Libre',serif; font-weight:900; font-size:40px; color:#fff; margin-inline-start:10px}
  .price .now small{font-size:20px; font-weight:700}
  .scarcity{font-size:13.5px; color:var(--gold-soft); margin-top:6px}
  .restart{text-align:center; margin-top:18px}
  .restart button{background:none;border:0;color:var(--ink-soft);font:inherit;cursor:pointer;font-size:14px;text-decoration:underline}

  .hidden{display:none}
  @media(prefers-reduced-motion:reduce){
    .scan .ring{animation:none; opacity:.25}
    .fill{transition:none}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">

    <!-- INTRO -->
    <section id="intro" class="pad intro">
      <div class="scan" aria-hidden="true">
        <span class="ring"></span><span class="ring"></span><span class="ring"></span>
        <span class="core">
          <svg viewBox="0 0 24 24" fill="none" stroke="#8E4E64" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 21s-7-4.4-9.3-9C1.4 9.2 2.7 6 6 6c2 0 3.2 1.2 4 2.3C10.8 7.2 12 6 14 6c3.3 0 4.6 3.2 3.3 6-2.3 4.6-9.3 9-9.3 9z" stroke="#B26B82"/>
            <path d="M3 12h4l1.6-3 2.4 6 1.8-4 1.3 2H21" stroke="#C19A53"/>
          </svg>
        </span>
      </div>
      <div class="eyebrow">עינת אור כהן · קוד הזוגיות הנשמתית</div>
      <h1>איזה דפוס חוזר<br>מנהל לך את הדייטים?</h1>
      <p class="lead">7 שאלות קצרות שיחשפו את הדפוס הסמוי שממגנט אלייך שוב ושוב את אותו סוג של גבר — ומה מסתתר מאחוריו.</p>
      <div class="meta"><span>⏱ <b>פחות מ-2 דקות</b></span><span>🔒 <b>אנונימי לחלוטין</b></span></div>
      <button class="btn" onclick="start()">בואי נתחיל לזהות את הדפוס</button>
    </section>

    <!-- QUIZ -->
    <section id="quiz" class="pad hidden">
      <div class="top">
        <span class="count" id="count"></span>
        <span class="eyebrow" style="margin:0">שאלון התדר</span>
      </div>
      <div class="bar"><div class="fill" id="fill"></div></div>
      <h2 class="q" id="question"></h2>
      <div id="options"></div>
      <button class="back hidden" id="back" onclick="back()">← לשאלה הקודמת</button>
    </section>

    <!-- RESULT -->
    <section id="result" class="pad hidden res"></section>

  </div>
</div>

<script>
const LINK = "https://meditaionlove.ravpage.co.il/srika2";

const questions = [
  { q:"איך את בדרך כלל פוגשת את הגברים שאת מתחברת אליהם?", o:[
    {v:"rescue",      t:"דרך עבודה, חברים או מפגשים אקראיים — בדרך כלל נמשכת למישהו שעובר תקופה קשה או זקוק שמישהי תרים אותו"},
    {v:"unavailable", t:"באפליקציות או באירועים — נמשכת לגבר כריזמטי, קצת חמקמק, שקשה 'לקרוא' אותו"},
    {v:"control",     t:"במקומות שבהם אני מרגישה בנוח ובשליטה — נמשכת למישהו רגוע שמעריך אותי ולא מטלטל אותי"},
    {v:"validation",  t:"כשמישהו פונה אליי ראשון ומרעיף תשומת לב — נמשכת לעוצמת ההתעניינות בי"} ]},

  { q:"מה הדבר הראשון שמצית אצלך עניין בגבר?", o:[
    {v:"rescue",      t:"התחושה שהוא זקוק לי — שיש לי מה לתת לו, להחזיק ולעזור לו לצמוח"},
    {v:"unavailable", t:"הביטחון, המסתורין והתחושה שהוא 'פרס' שצריך לכבוש"},
    {v:"control",     t:"שהוא מעריך אותי ולא מאיים על העצמאות והשקט הפנימי שלי"},
    {v:"validation",  t:"כמה הוא מחזר, מחמיא ומראה לי שאני מיוחדת"} ]},

  { q:"איך נראים בדרך כלל הדייטים הראשונים שלך?", o:[
    {v:"rescue",      t:"אני מקשיבה ותומכת, ומוצאת את עצמי 'מטפלת' בו עוד לפני שבאמת הכרנו"},
    {v:"unavailable", t:"מלאי ניצוצות וריגושים — אבל גם דריכות מתמדת אם הוא באמת בעניין"},
    {v:"control",     t:"נעימים ובשליטה שלי — אני מובילה את הקצב ושומרת מרחק רגשי"},
    {v:"validation",  t:"מרגישים מושלמים כשהוא 'דלוק', ומתרסקים ברגע שההתלהבות שלו יורדת"} ]},

  { q:"מה קורה כשהקשר מתחיל להיות רציני?", o:[
    {v:"rescue",      t:"אני שוקעת בלעזור לו ומאבדת את עצמי — ואז מתעוררת מתוסכלת שאני נותנת הכל"},
    {v:"unavailable", t:"דווקא אז הוא נבהל ומתרחק — ואני נשאבת לרדוף אחריו"},
    {v:"control",     t:"אני מתחילה להרגיש לחוצה מהקרבה ומחפשת סיבות למה זה 'לא זה'"},
    {v:"validation",  t:"אני נצמדת, בודקת כל הזמן שהוא עדיין רוצה אותי, ומפחדת שהוא יתקרר"} ]},

  { q:"כשגבר יציב, פנוי ובאמת מעוניין בך — איך את מרגישה?", o:[
    {v:"rescue",      t:"קצת משועממת — בלי מישהו 'להציל' אני לא ממש נדלקת"},
    {v:"unavailable", t:"פתאום הוא נראה לי פחות מעניין, יותר מדי 'זמין'"},
    {v:"control",     t:"נוח לי, אבל אני שומרת אותו במרחק בטוח מהלב"},
    {v:"validation",  t:"לא מאמינה שזה אמיתי — מחכה שמשהו ישתבש"} ]},

  { q:"מה המחשבה שחוזרת אצלך אחרי שקשר נגמר?", o:[
    {v:"rescue",      t:"'נתתי לו הכל — ולמה זה תמיד נגמר ככה?'"},
    {v:"unavailable", t:"'למה אני שוב נמשכת לגבר שלא באמת פנוי אליי?'"},
    {v:"control",     t:"'אולי פשוט עוד לא פגשתי מישהו ששווה להוריד בשבילו את החומות'"},
    {v:"validation",  t:"'מה לא בסדר בי שגורם להם להתרחק?'"} ]},

  { q:"מה הכי קשה לך להודות בו לגבי עצמך בזוגיות?", o:[
    {v:"rescue",      t:"שאני בוחרת בגברים מתוך הצורך להיות נחוצה"},
    {v:"unavailable", t:"שאני נמשכת דווקא למה שלא זמין — ובורחת ממה שכן"},
    {v:"control",     t:"שאני שומרת על שליטה כדי לא להיפגע — ובסוף נשארת לבד"},
    {v:"validation",  t:"שהערך שלי תלוי באישור שאני מקבלת מגבר"} ]}
];

const results = {
  rescue:{
    tag:"הדפוס שלך", name:"דפוס המַצִּילָה",
    sub:"את מצילה אותם — ומאבדת את עצמך",
    short:"את נמשכת שוב ושוב לגברים שצריכים 'הצלה' — כאלה שעוברים תקופה, תקועים, או זקוקים שמישהי תחזיק אותם. את נותנת, תומכת ומכילה — ולאט-לאט נעלמת בתוך הקשר.",
    code:"הלב שלך משדר: 'אני ראויה לאהבה רק כשאני נחוצה'. הקוד הזה ממגנט גברים שמחפשים מישהי שתחזיק אותם — לא שותפה שווה.",
    belief:"\"אני שווה אהבה רק כשאני נותנת ומועילה.\"",
    effect:"את משקיעה הכל, הוא נשען עלייך, ובסוף את מותשת ופגועה — בעוד הקשר אף פעם לא באמת ממלא אותך בחזרה."
  },
  unavailable:{
    tag:"הדפוס שלך", name:"דפוס מְחַפֶּשֶׂת האתגר",
    sub:"רודפת אחרי מי שבורח, בורחת ממי שנשאר",
    short:"את נמשכת לגברים כריזמטיים, מסתוריים ולא זמינים רגשית. הריגוש של 'לכבוש' אותם מרגיש כמו אהבה — אבל ברגע שגבר באמת פנוי אלייך, העניין מתפוגג.",
    code:"הלב שלך משדר: 'אהבה אמיתית צריך להרוויח בקושי'. הקוד הזה ממגנט בדיוק את הגברים שלא נשארים.",
    belief:"\"אם זה בא בקלות — זה לא שווה, וכנראה גם אני לא מספיק.\"",
    effect:"את רודפת אחרי מי שמתרחק, ומאבדת עניין במי שיציב — והלופ חוזר על עצמו שוב ושוב, שנה אחרי שנה."
  },
  control:{
    tag:"הדפוס שלך", name:"דפוס השליטה הרגשית",
    sub:"שומרת על השליטה — ונשארת לבד",
    short:"את נמשכת לגברים רגועים שמעריצים אותך ולא מטלטלים אותך — כך את נשארת בשליטה ובמרחק בטוח מהלב. וברגע שמתקרבים באמת, את מוצאת סיבות לסגת.",
    code:"הלב שלך משדר: 'אני אתקרב רק עד כאן'. הקוד הזה שומר אותך בטוחה — ולבד.",
    belief:"\"אם אתן ללב להיפתח לגמרי — אֶפָּגַע.\"",
    effect:"את שולטת בקצב, מחזיקה חומות, ומפספסת חיבור עמוק — ואז מסבירה לעצמך ש'עדיין לא פגשת את הנכון'."
  },
  validation:{
    tag:"הדפוס שלך", name:"דפוס מְחַפֶּשֶׂת האישור",
    sub:"הערך שלך עולה ויורד עם תשומת הלב שלו",
    short:"את נמשכת לגברים שמרעיפים תשומת לב בהתחלה — והערך שלך מתנדנד עם כמות החיזור שאת מקבלת. ברגע שההתלהבות שלו יורדת, את נכנסת לחרדה ולרדיפה.",
    code:"הלב שלך משדר: 'תאשר לי שאני שווה'. הקוד הזה ממגנט גברים שיודעים להלהיב בהתחלה — ולהתפוגג אחר כך.",
    belief:"\"הערך שלי תלוי בכמה גבר רוצה אותי.\"",
    effect:"את נצמדת, בודקת ומפחדת מדחייה — והפחד הזה בדיוק מה שמרחיק את הגברים שאת הכי רוצה לקרב."
  }
};

let idx = 0;
const answers = [];

function start(){ idx=0; answers.length=0; show('quiz'); render(); }

function render(){
  const q = questions[idx];
  document.getElementById('count').textContent = `שאלה ${idx+1} מתוך ${questions.length}`;
  document.getElementById('fill').style.width = `${(idx/questions.length)*100}%`;
  document.getElementById('question').textContent = q.q;
  const box = document.getElementById('options');
  box.innerHTML = '';
  q.o.forEach(opt=>{
    const b = document.createElement('button');
    b.className='opt';
    b.innerHTML = `<span class="dot"></span><span>${opt.t}</span>`;
    b.onclick = ()=>choose(opt.v);
    box.appendChild(b);
  });
  document.getElementById('back').classList.toggle('hidden', idx===0);
  document.getElementById('quiz').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function choose(v){
  answers[idx]=v;
  if(idx < questions.length-1){ idx++; render(); }
  else finish();
}
function back(){ if(idx>0){ idx--; render(); } }

function finish(){
  document.getElementById('fill').style.width = '100%';
  const tally={rescue:0,unavailable:0,control:0,validation:0};
  answers.forEach(a=>tally[a]++);
  // tie-break by order of first appearance among the max
  let best=null, max=-1;
  ['rescue','unavailable','control','validation'].forEach(k=>{
    if(tally[k]>max){max=tally[k]; best=k;}
  });
  const r = results[best];
  document.getElementById('result').innerHTML = `
    <div class="tag">${r.tag}</div>
    <h2>${r.name}</h2>
    <p class="sub">${r.sub}</p>

    <div class="block"><p>${r.short}</p></div>
    <div class="block"><div class="label">הקוד הרגשי שמושך</div><p>${r.code}</p></div>
    <div class="block"><div class="label">האמונה החוסמת</div><p class="belief">${r.belief}</p></div>
    <div class="block"><div class="label">איך זה משפיע על הדייטים שלך</div><p>${r.effect}</p></div>

    <div class="cta">
      <div class="spark">✦ הצעד הבא ✦</div>
      <h3>זיהית את הדפוס.<br>עכשיו הגיע הזמן לשחרר אותו.</h3>
      <p class="bridge">הדפוס הזה לא נולד בראש שלך — הוא חקוק בקוד הרגשי שלך. ושם בדיוק אפשר לשחרר אותו. בסדנת <b>"סריקת הנשמה"</b> תקבלי בדיוק את הכלים לעשות את זה:</p>
      <ul class="learn">
        <li><span class="v">✦</span><span>לאתר את <b>3 האמונות</b> שממגנטות אלייך את הגברים הלא נכונים</span></li>
        <li><span class="v">✦</span><span>לשחרר אותן בעזרת טכניקה פשוטה וקלה ליישום</span></li>
        <li><span class="v">✦</span><span>לסרוק את <b>הכוונות האמיתיות</b> של הגבר מולך — תוך 12 דקות, בלי לנחש</span></li>
        <li><span class="v">✦</span><span>להבין מהם <b>7 השלבים</b> לזוגיות שאת חולמת עליה</span></li>
      </ul>
      <div class="price"><span class="old">329 ₪</span><span class="now">69<small> ₪</small></span></div>
      <div class="scarcity">הצעה מיוחדת לחברות הקהילה בלבד</div>
      <button class="btn gold" onclick="window.open('${LINK}','_blank')">אני רוצה להשתחרר מהדפוס »</button>
    </div>

    <div class="restart"><button onclick="start()">למילוי השאלון מחדש</button></div>
  `;
  show('result');
  document.getElementById('result').scrollIntoView({behavior:'smooth',block:'start'});
}

function show(id){
  ['intro','quiz','result'].forEach(s=>document.getElementById(s).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}
</script>
